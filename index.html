<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EcoWatch — Community Pollution Reporter</title>
<link rel="stylesheet" href="styles.css" />
<!-- Make sure to replace the stylesheet link with your local 'styles.css' if hosting locally -->
<link rel="stylesheet" href="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css)" />
</head>
<body>
<div id="app">

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="logo" onclick="goTo('home')">
    <i class="ti ti-leaf" aria-hidden="true"></i>
    <div>EcoWatch<small>Community Pollution Reporter</small></div>
  </div>
  <div class="user-card" onclick="goTo('profile')">
    <div class="s-avatar"><i class="ti ti-user"></i></div>
    <div>
      <div class="s-name">Jake Montecillo</div>
      <div class="s-loc">📍 Cogon, Bogo City Cebu</div>
    </div>
  </div>
  <nav class="s-nav">
    <button class="s-btn active" data-screen="home" onclick="goTo('home',this)"><i class="ti ti-home"></i> Home</button>
    <button class="s-btn" data-screen="reports" onclick="goTo('reports',this)"><i class="ti ti-layout-grid"></i> My Reports</button>
    <button class="s-btn" data-screen="new" onclick="goTo('new',this)"><i class="ti ti-plus"></i> New Report</button>
    <button class="s-btn" data-screen="notifs" onclick="goTo('notifs',this)"><i class="ti ti-bell"></i> Notifications</button>
    <button class="s-btn" data-screen="profile" onclick="goTo('profile',this)"><i class="ti ti-user"></i> Profile</button>
  </nav>
  <div class="s-foot">EcoWatch v1.0 · Bogo City, Cebu</div>
</aside>

<!-- MAIN -->
<div id="main">

<!-- ══════════════════════════════
     SCREEN: HOME
══════════════════════════════ -->
<div class="screen active" id="sc-home">
  <!-- ... your static content for this screen ... -->
</div>
<!-- ... other screens as static HTML ... -->
<!-- Repeat for each screen, removing all JS-dependent attributes or event handlers unless they are static HTML -->
<!-- Example: -->
<div class="screen" id="sc-reports">
  <!-- ... -->
</div>
<!-- etc. -->

</div><!-- /main -->
</div><!-- /app -->

<!-- MODAL & TOAST (Unchanged, keep as static HTML if you wish) -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-icon" id="modal-icon">ℹ️</div>
    <div class="modal-title" id="modal-title">Title</div>
    <div class="modal-text" id="modal-text">Message text goes here.</div>
    <button class="modal-btn" onclick="closeModal()">OK</button>
  </div>
</div>
<div class="toast" id="toast">Message</div>
</body>
</html>
